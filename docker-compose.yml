services:
  postgres:
    image: postgres:16-alpine
    container_name: feedback-attachment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: feedback_attachments
      POSTGRES_USER: feedback_app
      POSTGRES_PASSWORD: feedback_app_password
    ports:
      - "5432:5432"
    volumes:
      - feedback_attachment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedback_app -d feedback_attachments"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.3
    container_name: feedback-attachment-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - feedback_attachment_keycloak_data:/opt/keycloak/data

volumes:
  feedback_attachment_postgres_data:
  feedback_attachment_keycloak_data: